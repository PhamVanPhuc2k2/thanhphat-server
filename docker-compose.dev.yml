services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: backend_dev
    ports:
      - "8888:8888"
    volumes:
      - .:/app
      - /app/node_modules
    env_file:
      - .env
    environment:
      - NODE_ENV=development
      - NODE_OPTIONS=--max-old-space-size=768
    deploy:
      resources:
        limits:
          memory: 1024m
    depends_on:
      - redis

  redis:
    image: redis:7-alpine
    container_name: redis_dev
    ports:
      - "6379:6379"
